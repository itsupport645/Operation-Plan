<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Day Shift Plan</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.8.0/dist/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f4f6f9; color: #1a1a1a; min-height: 100vh; padding: 2rem 1rem; }
    .page-wrap { max-width: 720px; margin: 0 auto; }
    .form-header { background: linear-gradient(135deg, #1a6abf, #1558a0); color: #fff; padding: 1.25rem 1.5rem; border-radius: 12px; margin-bottom: 1.5rem; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 16px rgba(26,106,191,0.25); }
    .form-header h1 { font-size: 20px; font-weight: 600; letter-spacing: 0.5px; }
    .form-header .date-badge { font-size: 13px; background: rgba(255,255,255,0.2); padding: 5px 14px; border-radius: 8px; font-weight: 500; }
    .section-card { background: #fff; border: 1px solid #e4e8ef; border-radius: 12px; padding: 1.4rem; margin-bottom: 1rem; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
    .section-title { font-size: 15px; font-weight: 600; color: #1a1a1a; padding-bottom: 10px; border-bottom: 1px solid #e4e8ef; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
    .section-badge { font-size: 11px; padding: 2px 10px; border-radius: 8px; background: #e6f1fb; color: #1a6abf; font-weight: 600; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    .field-row.single { grid-template-columns: 1fr; }
    .field { display: flex; flex-direction: column; gap: 5px; }
    label { font-size: 11px; color: #6b7280; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    input, select { width: 100%; height: 38px; padding: 0 10px; border: 1px solid #d1d5db; border-radius: 8px; background: #fff; color: #1a1a1a; font-size: 14px; font-family: inherit; transition: border-color 0.15s, box-shadow 0.15s; }
    input:focus, select:focus { outline: none; border-color: #1a6abf; box-shadow: 0 0 0 3px rgba(26,106,191,0.12); }
    input::placeholder { color: #9ca3af; }
    .sub-section { background: #f8fafc; border: 1px solid #e4e8ef; border-radius: 8px; padding: 1rem; margin-top: 10px; }
    .sub-title { font-size: 11px; font-weight: 700; color: #6b7280; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
    .stuffing-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 8px; align-items: end; }
    .carting-row { display: grid; grid-template-columns: 2fr 1fr 28px; gap: 8px; margin-bottom: 8px; align-items: end; }
    .add-btn { font-size: 12px; color: #1a6abf; background: none; border: 1px dashed #93c5fd; border-radius: 8px; padding: 6px 12px; cursor: pointer; width: 100%; margin-top: 6px; font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 4px; transition: background 0.15s; }
    .add-btn:hover { background: #e6f1fb; }
    .remove-btn { width: 28px; height: 38px; border: none; background: none; color: #9ca3af; cursor: pointer; font-size: 18px; border-radius: 6px; display: flex; align-items: center; justify-content: center; transition: color 0.15s, background 0.15s; }
    .remove-btn:hover { color: #dc2626; background: #fee2e2; }
    .submit-row { display: flex; gap: 12px; margin-top: 1.5rem; }
    .submit-btn { flex: 1; height: 46px; background: #1a6abf; color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; transition: background 0.15s, transform 0.1s; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .submit-btn:hover { background: #1558a0; }
    .submit-btn:active { transform: scale(0.98); }
    .reset-btn { height: 46px; padding: 0 20px; background: #fff; border: 1px solid #d1d5db; border-radius: 10px; color: #6b7280; font-size: 14px; cursor: pointer; font-family: inherit; transition: background 0.15s; }
    .reset-btn:hover { background: #f9fafb; }
    .success-msg { display: none; background: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; border-radius: 10px; padding: 14px 18px; font-size: 14px; margin-top: 1rem; text-align: center; font-weight: 500; }
    .row-with-remove { display: flex; gap: 4px; align-items: flex-end; }
    .row-with-remove > div { flex: 1; }
    @media (max-width: 520px) {
      .field-row { grid-template-columns: 1fr; }
      .stuffing-row { grid-template-columns: 1fr; }
      .carting-row { grid-template-columns: 1fr 1fr 28px; }
      .form-header { flex-direction: column; align-items: flex-start; gap: 8px; }
    }
  </style>
</head>
<body>
<div class="page-wrap">
  <div class="form-header">
    <h1>Day Shift Plan</h1>
    <span class="date-badge" id="dateDisplay"></span>
  </div>

  <!-- Date -->
  <div class="section-card">
    <div class="field-row single">
      <div class="field">
        <label>Shift Date</label>
        <input type="date" id="shiftDate" />
      </div>
    </div>
  </div>

  <!-- JOSHI -->
  <div class="section-card">
    <div class="section-title">
      <i class="ti ti-user"></i> Joshi
      <span class="section-badge">Section</span>
    </div>
    <div class="field-row">
      <div class="field"><label>RLS</label><input type="text" placeholder="Enter RLS" /></div>
      <div class="field"><label>BNP</label><input type="text" placeholder="Enter BNP" /></div>
    </div>
    <div class="field-row single">
      <div class="field"><label>Manpower</label><input type="number" min="0" placeholder="No. of workers" /></div>
    </div>
    <div class="sub-section">
      <div class="sub-title"><i class="ti ti-container"></i> Stuffing</div>
      <div id="joshiStuffing">
        <div class="stuffing-row">
          <div class="field"><label>Commodity</label><input type="text" value="RAPSEED" /></div>
          <div class="field"><label>Party</label><input type="text" value="MNT" /></div>
          <div class="row-with-remove">
            <div class="field"><label>Containers</label><input type="text" value="3x20" /></div>
            <button class="remove-btn" onclick="removeRow(this, '.stuffing-row')" title="Remove">×</button>
          </div>
        </div>
        <div class="stuffing-row">
          <div class="field"><label>Commodity</label><input type="text" value="BOX CARGO" /></div>
          <div class="field"><label>Party</label><input type="text" value="SAI" /></div>
          <div class="row-with-remove">
            <div class="field"><label>Containers</label><input type="text" value="5x40" /></div>
            <button class="remove-btn" onclick="removeRow(this, '.stuffing-row')" title="Remove">×</button>
          </div>
        </div>
      </div>
      <button class="add-btn" onclick="addStuffingRow('joshiStuffing')"><i class="ti ti-plus"></i> Add stuffing row</button>
    </div>
  </div>

  <!-- DHAMA -->
  <div class="section-card">
    <div class="section-title">
      <i class="ti ti-user"></i> Dhama
      <span class="section-badge">Section</span>
    </div>
    <div class="field-row">
      <div class="field"><label>RLS</label><input type="text" placeholder="Enter RLS" /></div>
      <div class="field"><label>BNP</label><input type="text" placeholder="Enter BNP" /></div>
    </div>
    <div class="field-row single">
      <div class="field"><label>Manpower</label><input type="number" min="0" placeholder="No. of workers" /></div>
    </div>
    <div class="sub-section">
      <div class="sub-title"><i class="ti ti-truck"></i> Carting</div>
      <div id="dhamaCarting">
        <div class="carting-row">
          <div class="field"><label>Type</label><input type="text" value="SPG" /></div>
          <div class="field"><label>Qty</label><input type="number" value="4" /></div>
          <button class="remove-btn" onclick="removeRow(this, '.carting-row')" title="Remove">×</button>
        </div>
        <div class="carting-row">
          <div class="field"><label>Type</label><input type="text" value="GS" /></div>
          <div class="field"><label>Qty</label><input type="number" value="2" /></div>
          <button class="remove-btn" onclick="removeRow(this, '.carting-row')" title="Remove">×</button>
        </div>
        <div class="carting-row">
          <div class="field"><label>Type</label><input type="text" value="CARGO" /></div>
          <div class="field"><label>Qty</label><input type="number" value="1" /></div>
          <button class="remove-btn" onclick="removeRow(this, '.carting-row')" title="Remove">×</button>
        </div>
      </div>
      <button class="add-btn" onclick="addCartingRow('dhamaCarting')"><i class="ti ti-plus"></i> Add carting row</button>
    </div>
    <div class="sub-section" style="margin-top:10px">
      <div class="sub-title"><i class="ti ti-container"></i> Stuffing</div>
      <div id="dhamaStuffing">
        <div class="stuffing-row">
          <div class="field"><label>Commodity</label><input type="text" value="RICE" /></div>
          <div class="field"><label>Party</label><input type="text" value="CARGO CORP" /></div>
          <div class="row-with-remove">
            <div class="field"><label>Containers</label><input type="text" value="2X20" /></div>
            <button class="remove-btn" onclick="removeRow(this, '.stuffing-row')" title="Remove">×</button>
          </div>
        </div>
        <div class="stuffing-row">
          <div class="field"><label>Commodity</label><input type="text" value="RICE" /></div>
          <div class="field"><label>Party</label><input type="text" value="CRM" /></div>
          <div class="row-with-remove">
            <div class="field"><label>Containers</label><input type="text" value="6X20" /></div>
            <button class="remove-btn" onclick="removeRow(this, '.stuffing-row')" title="Remove">×</button>
          </div>
        </div>
        <div class="stuffing-row">
          <div class="field"><label>Commodity</label><input type="text" value="STARCH" /></div>
          <div class="field"><label>Party</label><input type="text" value="NIDHI" /></div>
          <div class="row-with-remove">
            <div class="field"><label>Containers</label><input type="text" value="6X40" /></div>
            <button class="remove-btn" onclick="removeRow(this, '.stuffing-row')" title="Remove">×</button>
          </div>
        </div>
      </div>
      <button class="add-btn" onclick="addStuffingRow('dhamaStuffing')"><i class="ti ti-plus"></i> Add stuffing row</button>
    </div>
  </div>

  <!-- PRITESH -->
  <div class="section-card">
    <div class="section-title">
      <i class="ti ti-user"></i> Pritesh
      <span class="section-badge">Section</span>
    </div>
    <div class="field-row">
      <div class="field"><label>RLS</label><input type="text" placeholder="Enter RLS" /></div>
      <div class="field"><label>BNP</label><input type="text" placeholder="Enter BNP" /></div>
    </div>
    <div class="field-row single">
      <div class="field"><label>Manpower</label><input type="number" min="0" placeholder="No. of workers" /></div>
    </div>
    <div class="sub-section">
      <div class="sub-title"><i class="ti ti-truck"></i> Carting</div>
      <div id="priteshCarting">
        <div class="carting-row">
          <div class="field"><label>Type</label><input type="text" value="VENUS" /></div>
          <div class="field"><label>Trailers</label><input type="number" value="2" /></div>
          <button class="remove-btn" onclick="removeRow(this, '.carting-row')" title="Remove">×</button>
        </div>
      </div>
      <button class="add-btn" onclick="addCartingRow('priteshCarting')"><i class="ti ti-plus"></i> Add carting row</button>
    </div>
    <div class="sub-section" style="margin-top:10px">
      <div class="sub-title"><i class="ti ti-container"></i> Stuffing</div>
      <div id="priteshStuffing">
        <div class="stuffing-row">
          <div class="field"><label>Party</label><input type="text" value="VENUS" /></div>
          <div class="field"><label>Containers</label><input type="text" value="6X20" /></div>
          <div class="row-with-remove">
            <div class="field"><label>Commodity</label><input type="text" value="RICE" /></div>
            <button class="remove-btn" onclick="removeRow(this, '.stuffing-row')" title="Remove">×</button>
          </div>
        </div>
      </div>
      <button class="add-btn" onclick="addStuffingRow('priteshStuffing')"><i class="ti ti-plus"></i> Add stuffing row</button>
    </div>
  </div>

  <div class="submit-row">
    <button class="reset-btn" onclick="resetForm()">Reset</button>
    <button class="submit-btn" onclick="submitForm()"><i class="ti ti-send"></i> Submit Shift Plan</button>
  </div>
  <div class="success-msg" id="successMsg">✅ Shift plan submitted successfully!</div>
</div>

<script>
  const today = new Date();
  const fmt = today.toLocaleDateString('en-GB', { day: '2-digit', month: '2-digit', year: 'numeric' });
  document.getElementById('dateDisplay').textContent = fmt;
  document.getElementById('shiftDate').value = today.toISOString().split('T')[0];

  function addStuffingRow(containerId) {
    const c = document.getElementById(containerId);
    const div = document.createElement('div');
    div.className = 'stuffing-row';
    div.innerHTML = `
      <div class="field"><label>Commodity</label><input type="text" placeholder="Commodity" /></div>
      <div class="field"><label>Party</label><input type="text" placeholder="Party" /></div>
      <div class="row-with-remove">
        <div class="field"><label>Containers</label><input type="text" placeholder="e.g. 2x20" /></div>
        <button class="remove-btn" onclick="removeRow(this, '.stuffing-row')" title="Remove">×</button>
      </div>`;
    c.appendChild(div);
  }

  function addCartingRow(containerId) {
    const c = document.getElementById(containerId);
    const div = document.createElement('div');
    div.className = 'carting-row';
    div.innerHTML = `
      <div class="field"><label>Type</label><input type="text" placeholder="Type" /></div>
      <div class="field"><label>Qty</label><input type="number" placeholder="0" /></div>
      <button class="remove-btn" onclick="removeRow(this, '.carting-row')" title="Remove">×</button>`;
    c.appendChild(div);
  }

  function removeRow(btn, selector) {
    btn.closest(selector).remove();
  }

  function submitForm() {
    const date = document.getElementById('shiftDate').value;
    if (!date) { alert('Please select a shift date.'); return; }
    const msg = document.getElementById('successMsg');
    msg.style.display = 'block';
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    setTimeout(() => msg.style.display = 'none', 4000);
  }

  function resetForm() {
    if (!confirm('Reset all fields? This cannot be undone.')) return;
    document.querySelectorAll('input[type="text"], input[type="number"]').forEach(i => i.value = '');
    document.getElementById('shiftDate').value = today.toISOString().split('T')[0];
  }
</script>
</body>
</html>
